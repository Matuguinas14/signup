<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Page</title>
  <link rel="stylesheet" href="style.css"> <!-- link to your site's stylesheet -->
</head>
<body>
  <h1>Signup Form</h1>

  <form id="signupForm" onsubmit="return validateForm()">
    <!-- Personal Information -->
    <label for="fullName">Full Name:</label>
    <input type="text" id="fullName">
    <span id="nameError"></span><br><br>

    <label for="birthdate">Birthdate (must be 13 years old or older):</label>
    <input type="date" id="birthdate">
    <span id="birthError"></span><br><br>

    <label>Sex:</label>
    <input type="radio" name="sex" value="Male"> Male
    <input type="radio" name="sex" value="Female"> Female
    <span id="sexError"></span><br><br>

    <label for="email">Email (must contain @ and end with .):</label>
    <input type="email" id="email">
    <span id="emailError"></span><br><br>

    <!-- Account Details -->
    <label for="username">Username (8-20 characters, letters and digits only):</label>
    <input type="text" id="username">
    <span id="userError"></span><br><br>

    <label for="password">Password (min 10 chars: at least 1 uppercase, 1 lowercase, 1 digit):</label>
    <input type="password" id="password">
    <span id="passError"></span><br><br>

    <label for="confirmPassword">Confirm Password:</label>
    <input type="password" id="confirmPassword">
    <span id="confirmError"></span><br><br>

    <!-- Topic Questions -->
    <label for="dropdownQ">Choose your interest (required):</label>
    <select id="dropdownQ">
      <option value="">-- choose --</option>
      <option value="Option1">Option 1</option>
      <option value="Option2">Option 2</option>
    </select>
    <span id="dropdownError"></span><br><br>

    <label>Select your preferences (at least one required):</label><br>
    <input type="checkbox" name="preferences" value="Pref1"> Pref1
    <input type="checkbox" name="preferences" value="Pref2"> Pref2
    <input type="checkbox" name="preferences" value="Pref3"> Pref3
    <span id="checkboxError"></span><br><br>

    <label>How often do you use our site? (required):</label><br>
    <input type="radio" name="usage" value="Daily"> Daily
    <input type="radio" name="usage" value="Weekly"> Weekly
    <input type="radio" name="usage" value="Monthly"> Monthly
    <span id="usageError"></span><br><br>

    <!-- Submit -->
    <button type="submit">Join us and save the turtles!</button>
    <span id="successMessage"></span><br><br>

    <!-- Link to homepage -->
    <a href="index.html">Back to Homepage</a>
  </form>

  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
